server {
    listen 80;
    server_name _;

    # SPA root
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------
    # 1. Proxy API requests to your backend container
    # ---------------------------------------------------
    location /api {
        proxy_pass ${services__api__https__0}/api;   # <-- change to your Aspire API name/port
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
    }

    # ---------------------------------------------------
    # 2. Proxy SignalR hubs (requires WebSocket support)
    # ---------------------------------------------------
    location /hubs {
        proxy_pass ${services__api__https__0}/hubs;   # <-- same backend service
        proxy_ssl_server_name on;

        # WebSocket stuff
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------------------------------------------------
    # 3. Serve static files normally
    # ---------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
